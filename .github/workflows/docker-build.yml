name: Build And Deploy Image

on:
  push:
    branches:
      - main
      - codex/resin-proxy-integration
  workflow_dispatch:

concurrency:
  group: docker-branch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zc-eto/gemini-business2api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 优化构建参数
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false

  deploy:
    needs: build
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          set -euo pipefail
          : "${DOKPLOY_URL:?missing DOKPLOY_URL}"
          : "${DOKPLOY_API_KEY:?missing DOKPLOY_API_KEY}"
          : "${DOKPLOY_COMPOSE_ID:?missing DOKPLOY_COMPOSE_ID}"
          curl -fsS -X POST "${DOKPLOY_URL%/}/api/compose.deploy" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"json\":{\"composeId\":\"${DOKPLOY_COMPOSE_ID}\"}}"
