name: Build And Deploy Image

on:
  push:
    branches:
      - main
      - codex/resin-proxy-integration
  workflow_dispatch:

concurrency:
  group: docker-branch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zc-eto/gemini-business2api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 优化构建参数
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          provenance: false

  deploy:
    needs: build
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Update Dokploy compose image and redeploy
        env:
          DOKPLOY_HOST: ${{ secrets.DOKPLOY_HOST }}
          DOKPLOY_DIRECT_IP: ${{ secrets.DOKPLOY_DIRECT_IP }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          TARGET_IMAGE: ghcr.io/zc-eto/gemini-business2api:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          : "${DOKPLOY_HOST:?missing DOKPLOY_HOST}"
          : "${DOKPLOY_DIRECT_IP:?missing DOKPLOY_DIRECT_IP}"
          : "${DOKPLOY_API_KEY:?missing DOKPLOY_API_KEY}"
          : "${DOKPLOY_COMPOSE_ID:?missing DOKPLOY_COMPOSE_ID}"
          : "${TARGET_IMAGE:?missing TARGET_IMAGE}"
          python - <<'PY'
          import json
          import os
          import re
          import ssl
          import sys
          import urllib.parse
          import urllib.request

          host = os.environ["DOKPLOY_HOST"]
          direct_ip = os.environ["DOKPLOY_DIRECT_IP"]
          api_key = os.environ["DOKPLOY_API_KEY"]
          compose_id = os.environ["DOKPLOY_COMPOSE_ID"]
          target_image = os.environ["TARGET_IMAGE"]
          ctx = ssl._create_unverified_context()

          def request(path: str, method: str = "GET", payload: dict | None = None) -> dict:
              url = f"https://{direct_ip}{path}"
              body = None
              headers = {
                  "Host": host,
                  "x-api-key": api_key,
              }
              if payload is not None:
                  body = json.dumps(payload).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(url, data=body, method=method, headers=headers)
              with urllib.request.urlopen(req, context=ctx) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          query = urllib.parse.quote(json.dumps({"json": {"composeId": compose_id}}))
          compose = request(f"/api/trpc/compose.one?input={query}")["result"]["data"]["json"]["composeFile"]
          updated_compose, replacements = re.subn(
              r"(^\s*image:\s*)(\S+)",
              rf"\1{target_image}",
              compose,
              count=1,
              flags=re.MULTILINE,
          )
          if replacements != 1:
              print("Failed to locate image line in Dokploy compose", file=sys.stderr)
              sys.exit(1)

          update_result = request(
              "/api/compose.update",
              method="POST",
              payload={
                  "composeId": compose_id,
                  "composeFile": updated_compose,
              },
          )
          print("compose.update ok:", update_result.get("composeId", compose_id))

          redeploy_result = request(
              "/api/compose.redeploy",
              method="POST",
              payload={"composeId": compose_id},
          )
          print("compose.redeploy ok:", redeploy_result.get("message", "queued"))
          PY
